<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect with Rtr. Kiran</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050a05;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Courier New',monospace;
  color:#fff;
  padding:2rem;
  text-align:center;
}
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px);
  pointer-events:none;
}
.card{
  background:#0d160d;
  border:1px solid #1a2e1a;
  padding:2.5rem 2rem;
  max-width:380px;
  width:100%;
  position:relative;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#00ff88,transparent);
}
.badge{
  font-size:0.6rem;
  color:#00ff88;
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:1rem;
}
.name{
  font-size:2rem;
  font-weight:900;
  color:#fff;
  margin-bottom:0.25rem;
}
.name span{color:#00ff88}
.role{
  font-size:0.7rem;
  color:#5a7a5a;
  letter-spacing:0.15em;
  text-transform:uppercase;
  margin-bottom:2rem;
}
.district{
  display:inline-block;
  border:1px solid #1a2e1a;
  padding:0.4rem 1rem;
  font-size:0.65rem;
  color:#00ff88;
  letter-spacing:0.15em;
  margin-bottom:2rem;
}
.btn{
  width:100%;
  padding:1.25rem;
  background:#00ff88;
  color:#000;
  border:none;
  font-family:'Courier New',monospace;
  font-size:1rem;
  font-weight:900;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
  margin-bottom:1rem;
}
.btn:hover{background:#fff;transform:translateY(-2px)}
.btn:disabled{opacity:0.7;cursor:not-allowed;transform:none}
.status{
  font-size:0.8rem;
  min-height:2rem;
  line-height:1.6;
  color:#5a7a5a;
}
.status.success{color:#00ff88}
.status.error{color:#ff6b6b}
.status.warning{color:#ffc107}
.note{
  margin-top:1.5rem;
  font-size:0.62rem;
  color:#3a5a3a;
  line-height:1.8;
  letter-spacing:0.05em;
}
.note a{color:#00ff88;text-decoration:none}
.xp{
  font-size:3rem;
  font-weight:900;
  color:#00ff88;
  margin:1rem 0 0.25rem;
  display:none;
}
.xp-label{
  font-size:0.65rem;
  color:#5a7a5a;
  letter-spacing:0.2em;
  display:none;
}
</style>
</head>
<body>
<div class="card">
  <div class="badge">// ANANTA HUDDLE 2026 · RSAMDIO</div>
  <div class="name">RTR.<span>KIRAN</span></div>
  <div class="role">NOC Team · Security Analyst · District 3181</div>
  <div class="district">PASS ID: 88D892BF</div>

  <div class="xp" id="xp">+10</div>
  <div class="xp-label" id="xp-label">XP EARNED!</div>

  <button class="btn" id="btn" onclick="connect()">
    🤝 HANDSHAKE WITH KIRAN
  </button>

  <div class="status" id="status">
    Tap to connect · Both earn +10 XP
  </div>

  <div class="note" id="note">
    ⚠️ Must be logged into <a href="https://huddle.rsamdio.org" target="_blank">Ananta Huddle</a> in this browser first
  </div>
</div>

<script>
async function connect() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const note = document.getElementById('note');
  const xp = document.getElementById('xp');
  const xpLabel = document.getElementById('xp-label');

  btn.disabled = true;
  btn.textContent = '⏳ CONNECTING...';
  status.className = 'status';
  status.textContent = 'Sending handshake...';

  try {
    const res = await fetch(
      'https://us-central1-ananta-2026-rsamdio.cloudfunctions.net/createPassportConnection',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: { token: "88d892bfc7d1732745632e9ecac9ce9c" } })
      }
    );

    const data = await res.json();

    if (data.result && data.result.success) {
      btn.textContent = '✅ CONNECTED!';
      btn.style.background = '#00ff88';
      status.className = 'status success';
      status.textContent = '🎉 Handshake done with Rtr. Kiran!';
      xp.style.display = 'block';
      xpLabel.style.display = 'block';
      xp.textContent = '+' + (data.result.totalEarned || 10);
      note.style.display = 'none';
    } else if (data.error) {
      btn.textContent = '⚠️ ALREADY CONNECTED';
      btn.style.background = '#ffc107';
      btn.style.color = '#000';
      btn.disabled = false;
      status.className = 'status warning';
      status.textContent = 'You are already connected with Kiran!';
    } else {
      throw new Error('unexpected');
    }
  } catch(e) {
    btn.textContent = '❌ NOT LOGGED IN';
    btn.style.background = '#ff4444';
    btn.style.color = '#fff';
    btn.disabled = false;
    status.className = 'status error';
    status.textContent = 'Please login to Ananta Huddle first!';
    note.innerHTML = '👉 <a href="https://huddle.rsamdio.org" target="_blank">Login to Ananta Huddle</a> · then come back and tap again';
  }
}
</script>
</body>
</html>
